<svg xmlns="http://www.w3.org/2000/svg" width="220" height="90" viewBox="0 0 220 90" fill="none">
  <!-- P - confident downstroke with loop -->
  <path d="M22 72 L22 18 C22 18 23 14 28 14 C38 14 46 18 46 26 C46 34 40 40 30 40 L22 40"
    stroke="#0f0f0f" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- connecting stroke P to J -->
  <path d="M22 72 C26 72 34 68 42 62"
    stroke="#0f0f0f" stroke-width="3.0" stroke-linecap="round" fill="none"/>
  <!-- J - tall stem curving down and left -->
  <path d="M58 12 C58 12 56 14 56 18 L56 58 C56 66 52 74 44 76 C38 78 34 74 36 68"
    stroke="#0f0f0f" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- J dot/tittle -->
  <circle cx="58" cy="8" r="2.2" fill="#0f0f0f"/>
  <!-- connecting stroke J to S -->
  <path d="M56 52 C62 48 68 44 74 38"
    stroke="#0f0f0f" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- S - proper flowing S -->
  <path d="M88 22 C84 18 76 16 72 20 C68 24 70 30 76 34 C82 38 90 40 92 48 C94 56 88 62 80 62 C74 62 70 58 70 54"
    stroke="#0f0f0f" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Underline flourish - confident, long -->
  <path d="M18 78 C40 82 70 80 100 74 C110 72 116 72 120 74"
    stroke="#0f0f0f" stroke-width="2.0" stroke-linecap="round" fill="none"/>
</svg>
