<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- Typography Specimen — Perch type hierarchy -->

  <!-- Dark background -->
  <rect width="600" height="400" fill="#000000"/>

  <!-- ═══ Display ═══ -->
  <text x="40" y="48" font-family="JetBrains Mono, monospace" font-weight="400" font-size="11" fill="#4A9BA8">Display</text>
  <text x="160" y="48" font-family="JetBrains Mono, monospace" font-weight="400" font-size="9" fill="#666">Inter Bold 700</text>
  <text x="40" y="88" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="36" fill="#FFFFFF">The quick brown fox</text>

  <!-- Divider -->
  <line x1="40" y1="110" x2="560" y2="110" stroke="#222" stroke-width="1"/>

  <!-- ═══ System / Data ═══ -->
  <text x="40" y="140" font-family="JetBrains Mono, monospace" font-weight="400" font-size="11" fill="#4A9BA8">System / Data</text>
  <text x="200" y="140" font-family="JetBrains Mono, monospace" font-weight="400" font-size="9" fill="#666">JetBrains Mono 400</text>
  <text x="40" y="174" font-family="JetBrains Mono, monospace" font-weight="400" font-size="24" fill="#FFFFFF">0123456789 ABCDEF</text>

  <!-- Divider -->
  <line x1="40" y1="196" x2="560" y2="196" stroke="#222" stroke-width="1"/>

  <!-- ═══ Body ═══ -->
  <text x="40" y="226" font-family="JetBrains Mono, monospace" font-weight="400" font-size="11" fill="#4A9BA8">Body</text>
  <text x="100" y="226" font-family="JetBrains Mono, monospace" font-weight="400" font-size="9" fill="#666">Inter Light 300</text>
  <text x="40" y="254" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="16" fill="#FFFFFF">
    <tspan x="40" dy="0">Perch is an instrument by Wake, built by Candlefish.</tspan>
    <tspan x="40" dy="24">It delivers financial intelligence for operators who</tspan>
    <tspan x="40" dy="24">don't have a finance department.</tspan>
  </text>

  <!-- Divider -->
  <line x1="40" y1="322" x2="560" y2="322" stroke="#222" stroke-width="1"/>

  <!-- ═══ Summary table ═══ -->
  <text x="40" y="348" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#666">ROLE</text>
  <text x="160" y="348" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#666">FAMILY</text>
  <text x="380" y="348" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#666">WEIGHT</text>
  <text x="480" y="348" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#666">USE</text>

  <text x="40" y="366" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#999">Display</text>
  <text x="160" y="366" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#999">Inter</text>
  <text x="380" y="366" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#999">700</text>
  <text x="480" y="366" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#999">Headlines, titles</text>

  <text x="40" y="380" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#999">System</text>
  <text x="160" y="380" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#999">JetBrains Mono</text>
  <text x="380" y="380" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#999">400</text>
  <text x="480" y="380" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#999">Data, numbers, code</text>

  <text x="40" y="394" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#999">Body</text>
  <text x="160" y="394" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#999">Inter</text>
  <text x="380" y="394" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#999">300</text>
  <text x="480" y="394" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" fill="#999">Prose, descriptions</text>
</svg>
