<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <!-- Perch Brand Color Swatches -->

  <style>
    .label { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 600; }
    .hex { font-family: Inter, system-ui, sans-serif; font-size: 10px; font-weight: 400; fill: #666; }
    .row-label { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #333; }
  </style>

  <!-- Row 1 label -->
  <text x="20" y="28" class="row-label">Neutrals</text>

  <!-- Row 1: Neutrals -->
  <!-- Black -->
  <rect x="20" y="40" width="100" height="70" rx="6" fill="#000000"/>
  <text x="70" y="60" class="label" fill="#FFFFFF" text-anchor="middle">Black</text>
  <text x="70" y="95" class="label" fill="#FFFFFF" text-anchor="middle">#000000</text>

  <!-- Surface -->
  <rect x="132" y="40" width="100" height="70" rx="6" fill="#171717"/>
  <text x="182" y="60" class="label" fill="#FFFFFF" text-anchor="middle">Surface</text>
  <text x="182" y="95" class="label" fill="#FFFFFF" text-anchor="middle">#171717</text>

  <!-- Neutral 700 -->
  <rect x="244" y="40" width="100" height="70" rx="6" fill="#404040"/>
  <text x="294" y="60" class="label" fill="#FFFFFF" text-anchor="middle">Neutral 700</text>
  <text x="294" y="95" class="label" fill="#FFFFFF" text-anchor="middle">#404040</text>

  <!-- Neutral 400 -->
  <rect x="356" y="40" width="100" height="70" rx="6" fill="#A3A3A3"/>
  <text x="406" y="60" class="label" fill="#000000" text-anchor="middle">Neutral 400</text>
  <text x="406" y="95" class="label" fill="#000000" text-anchor="middle">#A3A3A3</text>

  <!-- White -->
  <rect x="468" y="40" width="100" height="70" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="518" y="60" class="label" fill="#000000" text-anchor="middle">White</text>
  <text x="518" y="95" class="label" fill="#000000" text-anchor="middle">#FFFFFF</text>

  <!-- Row 2 label -->
  <text x="20" y="148" class="row-label">Brand</text>

  <!-- Row 2: Brand colors -->
  <!-- CF Cyan -->
  <rect x="20" y="160" width="100" height="70" rx="6" fill="#04DAF6"/>
  <text x="70" y="180" class="label" fill="#000000" text-anchor="middle">CF Cyan</text>
  <text x="70" y="215" class="label" fill="#000000" text-anchor="middle">#04DAF6</text>

  <!-- CF Teal -->
  <rect x="132" y="160" width="100" height="70" rx="6" fill="#0F637B"/>
  <text x="182" y="180" class="label" fill="#FFFFFF" text-anchor="middle">CF Teal</text>
  <text x="182" y="215" class="label" fill="#FFFFFF" text-anchor="middle">#0F637B</text>

  <!-- Perch Accent -->
  <rect x="244" y="160" width="100" height="70" rx="6" fill="#4A9BA8"/>
  <text x="294" y="180" class="label" fill="#000000" text-anchor="middle">Perch Accent</text>
  <text x="294" y="215" class="label" fill="#000000" text-anchor="middle">#4A9BA8</text>

  <!-- Perch Dim -->
  <rect x="356" y="160" width="100" height="70" rx="6" fill="#357580"/>
  <text x="406" y="180" class="label" fill="#FFFFFF" text-anchor="middle">Perch Dim</text>
  <text x="406" y="215" class="label" fill="#FFFFFF" text-anchor="middle">#357580</text>

  <!-- Perch Bright -->
  <rect x="468" y="160" width="100" height="70" rx="6" fill="#5EC4C9"/>
  <text x="518" y="180" class="label" fill="#000000" text-anchor="middle">Perch Bright</text>
  <text x="518" y="215" class="label" fill="#000000" text-anchor="middle">#5EC4C9</text>

  <!-- Relationship: CF Cyan -> Perch Accent -> CF Teal -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4A9BA8"/>
    </marker>
  </defs>

  <!-- Connection line from CF Cyan swatch bottom to Perch Accent swatch bottom -->
  <line x1="70" y1="236" x2="70" y2="256" stroke="#4A9BA8" stroke-width="1.5"/>
  <line x1="70" y1="256" x2="286" y2="256" stroke="#4A9BA8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Connection line from Perch Accent swatch bottom to CF Teal swatch bottom -->
  <line x1="294" y1="236" x2="294" y2="272" stroke="#4A9BA8" stroke-width="1.5"/>
  <line x1="294" y1="272" x2="190" y2="272" stroke="#4A9BA8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Relationship label -->
  <text x="300" y="292" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A9BA8" text-anchor="middle">CF Cyan &#x2192; Perch Accent &#x2192; CF Teal</text>
</svg>
